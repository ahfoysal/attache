# For running Attaché's stateful infra on a machine that has Docker.
# On this dev box we use native Homebrew Postgres + Redis instead, so this
# file is here for portability (Phase 1+ on other machines), not used locally.
services:
  postgres:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_USER: attache
      POSTGRES_PASSWORD: attache
      POSTGRES_DB: attache
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./db/schema.sql:/docker-entrypoint-initdb.d/01-schema.sql:ro
  redis:
    image: redis:7
    ports:
      - "6379:6379"
volumes:
  pgdata:
